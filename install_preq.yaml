- hosts: all
  gather_facts: true
  become: true
  vars:
    aptPackages: [ 'tzdata', 'sudo', 'figlet', 'less', 'htop', 'vim', 'curl', 'git', 'python-is-python3', 'jq' ]
    preqPackages: [ 'apt-transport-https', 'ca-certificates', 'gnupg' ]
    kubePackages: [ 'kubeadm', 'kubectl', 'kubelet']
    kernelModsToLoad: [ 'overlay', 'br_netfilter' ]
    kubeVersion: "v1.35"
    defaultWorkPath: "./work_files"
    tgzWorkPath: "{{ defaultWorkPath }}/tgz"
    cridockerdPath: "{{ defaultWorkPath }}/git/cri-dockerd"
  tasks:
    - name: initial installation
      block:
        - name: update apt cache
          apt: update_cache=yes force_apt_get=yes cache_valid_time=3600
        - name: install basic tools
          loop: "{{ aptPackages }}"
          apt:
            name: "{{ item }}"
            state: present

        - name: set timezone
          timezone:
            name: Europe/Berlin

        - name: upgrade of all packages on the remote machine
          apt: upgrade=dist force_apt_get=yes
          register: aptout

        - name: reboot of the machine
          reboot:
            msg: "Reboot initiated by Ansible for kernel updates"
            connect_timeout: 5
            reboot_timeout: 300
            pre_reboot_delay: 0
            post_reboot_delay: 30
            test_command: uptime
          when: ((ansible_uptime_seconds > 432000) and (ansible_hostname != "ansible" ))

        - name: replace sshd config
          copy:
            src: /home/manu/ansible/files/conf/ssh/sshd_config
            dest: /etc/ssh/sshd_config
            owner: root
            group: root
            mode: '0644'
          register: sshd_config_file

        - name: sshd restart
          service:
            name: sshd
            state: restarted
          when: sshd_config_file.changed
    
    - name: K8s Preq's
      block:
      - name: preq packages
        loop: "{{ preqPackages }}"
        apt:
          name: "{{ item }}"
          state: present

      - name: turn swap off if used
        shell: "swapoff -a"
        become: true

      - name: turn swap off permanently
        replace:
          path: /etc/fstab
          regexp: '^(\s*)([^#\n]+\s+)(\w+\s+)swap(\s+.*)$'
          replace: '#\1\2\3swap\4'
          backup: yes
        when: ansible_swaptotal_mb > 0

      - name: enable kernel modules
        loop: "{{ kernelModsToLoad }}"
        community.general.modprobe:
          name: "{{ item }}"
          state: present
          persistent: present

      - name: setting sysctl net.bridge.bridge-nf-call-iptables = 1
        ansible.posix.sysctl:
          name: net.bridge.bridge-nf-call-iptables
          value: '1'
          state: present

      - name: setting sysctl net.bridge.bridge-nf-call-ip6tables = 1
        ansible.posix.sysctl:
          name: net.bridge.bridge-nf-call-ip6tables
          value: '1'
          state: present

      - name: setting sysctl net.ipv4.ip_forward = 1
        ansible.posix.sysctl:
          name: net.ipv4.ip_forward
          value: '1'
          state: present

      - name: add k8s repo
        get_url:
          url: "https://pkgs.k8s.io/core:/stable:/{{ kube_version }}/deb/Release.key"
          dest: /etc/apt/keyrings/k8s.asc
    
      - name: fix file permissions
        file:
          path: /etc/apt/keyrings/k8s.asc
          state: file
          mode: 0644

      - name: fix directory permissions
        file:
          path: /etc/apt/keyrings/
          state: directory
          mode: o+x

      - name: create k8s repo file
        apt_repository:
          repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/k8s.asc] https://pkgs.k8s.io/core:/stable:/{{ kube_version }}/deb/ /"
          state: present

      - name: update apt cache
        apt:
          update_cache=yes

      - name: install kubernetes packages
        loop: "{{ kubePackages }}"
        apt:
          name: "{{ item }}"
          state: present

    - name: Docker Preq's
      tags: cri-dockerd
      block:
        - name: pull latest git changes from cri-dockerd (localhost)
          git:
            repo: 'https://github.com/Mirantis/cri-dockerd.git'
            dest: "{{ cridockerdPath }}"
          delegate_to: localhost
          run_once: true

        - name: get latest cri-dockerd release (localhost)
          shell: curl -s https://api.github.com/repos/Mirantis/cri-dockerd/releases/latest | grep browser_download_url | grep .amd64.tgz | grep -v darwin | cut -d '"' -f 4
          register: cridockerdOutput
          delegate_to: localhost
          run_once: true

        - name: get cridockerd tar.gz (localhost)
          url_get: "{{ cridockerdOutput.stdout_lines }}"
            dest: "{{ tgzWorkPath }}"
          delegate_to: localhost
          run_once: true

        - name: copy over cri-dockerd
          copy:
            src: "{{ cridockerdPath }}/cri-dockerd"
            dest: /usr/local/bin/cri-dockerd
            mode: 0755
            owner: root
            group: root

        - name: copy over cri-docker.service
          copy:
            src:
            dest: 

        - name: copy over cri-docker.socket
          copy:
            src:
            dest:

