- name: turn swap off if used
  shell: "swapoff -a"
  become: true

- name: turn swap off permanently
  replace:
    path: /etc/fstab
    regexp: '^(\s*)([^#\n]+\s+)(\w+\s+)swap(\s+.*)$'
    replace: '#\1\2\3swap\4'
    backup: yes
  when: ansible_swaptotal_mb > 0

- name: enable kernel modules
  loop: "{{ kernelModsToLoad }}"
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present

- name: setting sysctl net.bridge.bridge-nf-call-iptables = 1
  ansible.posix.sysctl:
    name: net.bridge.bridge-nf-call-iptables
    value: '1'
    state: present

- name: setting sysctl net.bridge.bridge-nf-call-ip6tables = 1
  ansible.posix.sysctl:
    name: net.bridge.bridge-nf-call-ip6tables
    value: '1'
    state: present

- name: setting sysctl net.ipv4.ip_forward = 1
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present

- name: add k8s repo
  get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubeVersion }}/deb/Release.key"
    dest: /etc/apt/keyrings/k8s.asc

- name: fix file permissions
  file:
    path: /etc/apt/keyrings/k8s.asc
    state: file
    mode: 0644

- name: fix directory permissions
  file:
    path: /etc/apt/keyrings/
    state: directory
    mode: o+x

- name: create k8s repo file
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/k8s.asc] https://pkgs.k8s.io/core:/stable:/{{ kubeVersion }}/deb/ /"
    state: present

- name: update apt cache
  apt:
    update_cache: yes

- name: install kubernetes packages
  loop: "{{ kubePackages }}"
  apt:
    name: "{{ item }}"
    state: present
